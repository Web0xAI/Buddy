      <path d="M369 306 C363 338 365 361 372 388"/>
      <path d="M438 284 C434 328 435 361 442 397"/>
      <path d="M512 274 C509 321 509 358 512 398"/>
      <path d="M586 284 C590 328 589 361 582 397"/>
      <path d="M655 306 C661 338 659 361 652 388"/>
