        C233 139 362 55 512 55
        C662 55 791 139 811 340
        C736 277 638 248 512 248
        C386 248 288 277 213 340 Z" fill="url(#capGrad)"/>
      <path d="M512 66 C501 123 498 192 502 258" fill="none" stroke="#056CC5" stroke-width="8" stroke-linecap="round" opacity="0.38"/>
      <path d="M360 91 C407 136 438 196 453 263" fill="none" stroke="#056CC5" stroke-width="6" stroke-linecap="round" opacity="0.26"/>
