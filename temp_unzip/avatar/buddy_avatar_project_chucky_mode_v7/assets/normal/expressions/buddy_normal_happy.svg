      <ellipse cx="501" cy="559" rx="16" ry="10" fill="#FFE0C3" opacity="0.58"/>
    </g>

    <!-- freckles clearer but still soft -->
    <g id="freckles" fill="#9F5731">
      <circle cx="332" cy="556" r="5"/><circle cx="358" cy="541" r="5"/><circle cx="386" cy="557" r="5"/><circle cx="356" cy="573" r="4"/><circle cx="393" cy="536" r="4"/>
      <circle cx="692" cy="556" r="5"/><circle cx="666" cy="541" r="5"/><circle cx="638" cy="557" r="5"/><circle cx="668" cy="573" r="4"/><circle cx="631" cy="536" r="4"/>
