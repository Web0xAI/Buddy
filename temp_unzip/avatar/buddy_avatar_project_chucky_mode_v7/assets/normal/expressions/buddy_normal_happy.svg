      <circle cx="601" cy="462" r="13" fill="#FFFFFF"/>
      <circle cx="430" cy="529" r="8" fill="#54CAFF" opacity="0.84"/>
      <circle cx="646" cy="529" r="8" fill="#54CAFF" opacity="0.84"/>
