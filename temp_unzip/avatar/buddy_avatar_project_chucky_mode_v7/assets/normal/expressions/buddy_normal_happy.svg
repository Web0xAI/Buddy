<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Buddy Normal Mode improved happy">
  <defs>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE5C8"/><stop offset="46%" stop-color="#FFC894"/><stop offset="100%" stop-color="#EDA16B"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#68CCFF"/><stop offset="48%" stop-color="#139AF3"/><stop offset="100%" stop-color="#056DC5"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#965322"/><stop offset="100%" stop-color="#3C1B08"/>
