    <g id="mouth"><path d="M420 616 C456 686 568 686 604 616 Q596 691 512 702 Q428 691 420 616 Z" fill="#A53D27"/><path d="M454 623 C482 648 542 648 570 623 Q552 606 512 606 Q472 606 454 623 Z" fill="#FFFFFF"/><ellipse cx="512" cy="672" rx="36" ry="14" fill="#E36C77" opacity="0.75"/></g>

    <!-- subtle face outline -->
    <path d="M512 246 C661 246 762 353 762 523 C762 677 660 762 512 762 C364 762 262 677 262 523 C262 353 363 246 512 246 Z"
