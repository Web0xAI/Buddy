      <circle cx="630" cy="805" r="31" fill="#FFD83D" stroke="#B98700" stroke-width="5"/>
      <g fill="#A26C00">
        <circle cx="384" cy="795" r="4"/><circle cx="404" cy="795" r="4"/><circle cx="384" cy="815" r="4"/><circle cx="404" cy="815" r="4"/>
        <circle cx="620" cy="795" r="4"/><circle cx="640" cy="795" r="4"/><circle cx="620" cy="815" r="4"/><circle cx="640" cy="815" r="4"/>
